services:
  db:
    image: postgres:16-alpine
    container_name: opensound_db
    environment:
      POSTGRES_USER: ${DB_USER:-opensound}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_NAME:-opensound_registry}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
